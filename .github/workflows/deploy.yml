name: FTP Deploy

on:
  push:
    branches:
      - main  # You can change the branch name as needed

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v3
    
    - name: Upload files via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ftp-sepaehs.alwaysdata.net
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./  # The directory you want to upload (current directory)
        server-dir: /www/  # The directory on the FTP server where you want to upload files
